- hosts : all
  become: true

  tasks:
# Secure SSH :
    - name: sec ssh
      blockinfile:
        path: /etc/ssh/sshd_config
        state: present
        backup: yes
        insertafter: "EOF"
        block: |
          Match User ansible
                AllowUsers ansible@10.48.101.32
                PasswordAuthentication no
    - name: restart ssh
      service:
        name: sshd 
        state: restarted
        
# Disable login with password :
    - name: disable login password
      user:
        name: ansible
        password: "!"
        
# Install Bind sur les deux serveur :
    - name: Install Bind
      apt:
        update_cache: yes
        name: bind9
        state: present

    - name: Remplacer la configuration DNS via template
      copy:
        dest: /etc/bind/named.conf.options
        content: "{{ lookup('template', 'dns.j2') }}"
      notify: restart bind9

  handlers:
    - name: restart ssh
      service:
        name: ssh
        state: restarted

    - name: restart bind9
      service:
        name: bind9
        state: restarted